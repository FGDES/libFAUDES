name: Build libFAUDES on OsX

on:
  workflow_dispatch:
      
jobs:

  configure:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install Extra Libs
      run: |
          sudo apt-get install doxygen swig
          sudo apt-get install libreadline-dev
    - name: Figure Version
      run: |
        . ./VERSION
        echo "VMAJOR=$FAUDES_VERSION_MAJOR" >> "$GITHUB_ENV"
        echo "VMINOR=$FAUDES_VERSION_MINOR" >> "$GITHUB_ENV"
    - name: Configure libFAUDES v${{ env.VMAJOR }}.${{ env.VMINOR }}
      run: |
        make -j configure
        make clean
        tar -czf faudes.tgz ./*
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: faudes.tgz
        path: ./faudes.tgz
        if-no-files-found: error
	compression-level: 0

  build:  

    runs-on: macos-latest
    needs: [configure]
    
    steps:	
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: faudes.tgz
        path: ./	
    - name: Extract Archive
      run: |
        tar -xzf faudes.tgz
    - name: Install Tools
      run: |
        brew update
        brew install make
    - name: Build Default Targets
      run: |
        gmake -j1
    - name: Build Tutorials
      run: gmake -j1 tutorial
    - name: Run Test Cases
      run: gmake -j1 test
