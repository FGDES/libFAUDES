name: libFAUDES Test Cases

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+.[0-9]+*'
      
jobs:

  configure:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install Extra Libs and Tools
      run: |
          sudo apt-get install doxygen swig
          sudo apt-get install libreadline-dev
    - name: Figure Version
      run: |
        . ./VERSION
        echo "VMAJOR=$FAUDES_VERSION_MAJOR" >> "$GITHUB_ENV"
        echo "VMINOR=$FAUDES_VERSION_MINOR" >> "$GITHUB_ENV"
    - name: Configure libFAUDES v${{ env.VMAJOR }}.${{ env.VMINOR }}
      run: |
        make -j configure
        make clean
        rm -rf ./bin/*
        echo "notempty" > ./obj/notempty
        echo "notempty" > ./bin/notempty
        tar -czf faudes.tgz ./*
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: faudes.tgz
        path: ./faudes.tgz
        if-no-files-found: error


  build-lx:
  
    runs-on: ubuntu-latest
    needs: [configure]
    
    steps:	
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: faudes.tgz
        path: ./	
    - name: Extract Archive
      run: |
        tar -xzf faudes.tgz
    - name: Install Extra Libs 
      run: |
          sudo apt-get install libreadline-dev
    - name: Build Default Targets
      run: |
        make 
    - name: Build Tutorials
      run: make  tutorial
    - name: Run Test Cases
      run: make test


  build-osx:
  
    runs-on: macos-latest
    needs: [configure]
    
    steps:	
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: faudes.tgz
        path: ./	
    - name: Extract Archive
      run: |
        tar -xzf faudes.tgz
    - name: Install Tools
      run: |
        brew update
        brew install make
    - name: Build Default Targets
      run: |
        gmake 
    - name: Build Tutorials
      run: gmake  tutorial
    - name: Run Test Cases
      run: gmake test


  build-msys:
  
    runs-on: windows-latest
    needs: [configure]
    
    steps:	
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: faudes.tgz
        path: ./
    - name: Extract Archive
      run: |
        tar -xzf faudes.tgz
    - name: Install Tools	
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        install: >-
          base-devel
          mingw-w64-ucrt-x86_64-gcc
          swig 
          perl 
          doxygen 
          ncurses-devel 
          libreadline-devel 
    - name: Build Default Targets
      shell: msys2 {0}
      run: |
        make -j1
    - name: Build Tutorials
      shell: msys2 {0}
      run: make  -j1 tutorial
    - name: Run Test Cases
      shell: msys2 {0}
      run: make -j1 test


  build-msvc:  

    runs-on: windows-latest
    needs: [configure]
    defaults:
      run:
        shell: cmd

    steps:	
    - name: Install MSVC
      uses: TheMrMilchmann/setup-msvc-dev@v3
      with:
        arch: x64
    - name: Install MSYS
      uses: msys2/setup-msys2@v2
      id: msys2
      with:
        msystem: UCRT64
        install: >-
          make
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: faudes.tgz
        path: ./
    - name: Extract Archive
      run: |
        tar -xzf faudes.tgz
    - name: Build Static Libray 
      run: |
        set GNUMAKE=${{ steps.msys2.outputs.msys2-location }}\usr\bin\make.exe 
        %GNUMAKE% FAUDES_PLATFORM=cl_win FAUDES_LINKING="static debug" -j1 libfaudes
    - name: Build Tools
      run: |
        set GNUMAKE=${{ steps.msys2.outputs.msys2-location }}\usr\bin\make.exe 
        %GNUMAKE% FAUDES_PLATFORM=cl_win FAUDES_LINKING="static debug" -j1 binaries
    - name: Build Tutorials
      run: |
        set GNUMAKE=${{ steps.msys2.outputs.msys2-location }}\usr\bin\make.exe 
        %GNUMAKE% FAUDES_PLATFORM=cl_win FAUDES_LINKING="static debug" -j1 tutorial
    - name: Run Test Cases
      run: |
        set GNUMAKE=${{ steps.msys2.outputs.msys2-location }}\usr\bin\make.exe 
        %GNUMAKE% FAUDES_PLATFORM=cl_win FAUDES_LINKING="static debug" -j1 test
    - name: Build DSO incl Tools
      run: |
        del obj\*.obj
        del bin\*.exe
        del plugins\luabindings\obj\*.obj
        set GNUMAKE=${{ steps.msys2.outputs.msys2-location }}\usr\bin\make.exe
        %GNUMAKE% FAUDES_PLATFORM=cl_win FAUDES_LINKING="static debug" -j1 

